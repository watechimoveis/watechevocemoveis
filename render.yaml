# Blueprint Render — W.A.Techevoceimoveis
# Deploy: Render Dashboard → New → Blueprint → repo GitHub
# Preencher no 1º deploy: DATABASE_URL e ADMIN_PASSWORD (watech-api)

services:
  - type: web
    name: watech-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "480"
      - key: ADMIN_EMAIL
        value: teste@watechimoveis.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_UPLOAD_MB
        value: "5"
      - key: CORS_ORIGINS
        value: https://watech-site.onrender.com,https://watech-admin.onrender.com

  - type: web
    name: watech-admin
    runtime: static
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
    routes:
      - type: rewrite
        source: /api/*
        destination: https://watech-api.onrender.com/api/*
      - type: rewrite
        source: /uploads/*
        destination: https://watech-api.onrender.com/uploads/*
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: watech-site
    runtime: static
    rootDir: website
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_ADMIN_URL
        value: https://watech-admin.onrender.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://watech-api.onrender.com/api/*
      - type: rewrite
        source: /uploads/*
        destination: https://watech-api.onrender.com/uploads/*
      - type: rewrite
        source: /*
        destination: /index.html
