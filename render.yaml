# Blueprint Render — W.A.Techevoceimoveis
# Deploy: Render Dashboard → New → Blueprint → repo GitHub
# Preencher no 1º deploy: DATABASE_URL e ADMIN_PASSWORD (watech-api)

services:
  - type: web
    name: watech-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "480"
      - key: ADMIN_EMAIL
        value: teste@watechimoveis.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_UPLOAD_MB
        value: "5"
      - key: CORS_ORIGINS
        value: https://watech-site.onrender.com,https://watech-admin.onrender.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STORAGE_BUCKET
        value: property-images

  - type: web
    name: watech-admin
    runtime: static
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        value: https://watech-api.onrender.com
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: watech-site
    runtime: static
    rootDir: website
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_ADMIN_URL
        value: https://watech-admin.onrender.com
      - key: VITE_API_URL
        value: https://watech-api.onrender.com
      - key: VITE_CONTACT_WHATSAPP
        sync: false
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
