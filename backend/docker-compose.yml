services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: watech
      POSTGRES_PASSWORD: watech
      POSTGRES_DB: watechimoveis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watech -d watechimoveis"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://watech:watech@db:5432/watechimoveis
      APP_ENV: development
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:5174
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - uploads_data:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  uploads_data:
